# Azure Function App Deployment Workflow
#
# This workflow automatically deploys the WindowBot Azure Function app to Azure
# when code is pushed to the main branch by the repository owner (theonezozo).
#
# REQUIRED SECRET:
# You must configure the AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret in GitHub:
#   1. Go to Azure Portal: https://portal.azure.com
#   2. Navigate to your target Function App
#   3. Click "Overview" in the left menu
#   4. Click "Get publish profile" button in the top menu bar
#   5. Download the .PublishSettings XML file
#   6. Go to GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   7. Name: AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#   8. Value: Paste the entire contents of the downloaded XML file
#   9. Click "Add secret"
#
# The workflow will be skipped (not failed) for pushes from other users.

name: Deploy Azure Function App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run this job when the pusher is theonezozo
    if: github.actor == 'theonezozo'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve Function App name from publish profile
        id: profile
        shell: bash
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          profile_xml = os.environ.get("AZURE_FUNCTIONAPP_PUBLISH_PROFILE", "").strip()
          if not profile_xml:
              raise SystemExit(
                  "Fatal: AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret is not configured. "
                  "Add this secret in GitHub repository settings before deploying."
              )

          try:
              root = ET.fromstring(profile_xml)
          except ET.ParseError as exc:
              raise SystemExit(
                  "AZURE_FUNCTIONAPP_PUBLISH_PROFILE is not valid XML. "
                  "Re-download the publish profile from Azure and update the secret."
              ) from exc
          app_name = None

          # Prefer SCM-enabled publish profiles used by Azure/functions-action.
          for profile in root.findall("publishProfile"):
              if profile.get("publishMethod") in {"ZipDeploy", "MSDeploy"}:
                  app_name = profile.get("msdeploySite")
                  if app_name:
                      break

          # Fallback for profile formats that don't include msdeploySite.
          if not app_name:
              for profile in root.findall("publishProfile"):
                  app_name = profile.get("siteName")
                  if app_name:
                      break

          if not app_name:
              raise SystemExit(
                  "Could not determine Function App name from AZURE_FUNCTIONAPP_PUBLISH_PROFILE. "
                  "Verify the publish profile XML includes 'msdeploySite' or 'siteName'."
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"app_name={app_name}\n")
          PY

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.profile.outputs.app_name }}
          package: '.'
          # Required when using publish-profile auth for Flex Consumption apps
          sku: 'flexconsumption'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
