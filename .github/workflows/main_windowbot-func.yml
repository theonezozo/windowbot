# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - windowbot-func

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.11' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # NOTE (2026-05-25, Janine): The previous "Create and start virtual environment"
      # and "Install dependencies" steps shipped a deps-less ZIP (venv contains only pip
      # and setuptools; source `activate` doesn't persist to the next `run:` step; deps
      # never landed in .python_packages/). Removed. Oryx remote build now installs deps
      # server-side via scm-do-build-during-deployment + enable-oryx-build on the deploy
      # step below.

      - name: Stamp build version
        shell: bash
        run: |
          COMMIT_SHA_FULL="${{ github.sha }}"
          COMMIT_SHA="${COMMIT_SHA_FULL:0:7}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA_FULL}"
          # github.event.head_commit.timestamp is ISO-8601 with timezone (e.g. "2026-05-21T18:30:00-07:00")
          # Normalize to UTC ISO with trailing Z.
          COMMIT_TIME_RAW="${{ github.event.head_commit.timestamp }}"
          if [ -n "$COMMIT_TIME_RAW" ]; then
            COMMIT_TIME="$(python3 -c "from datetime import datetime, timezone; print(datetime.fromisoformat('$COMMIT_TIME_RAW').astimezone(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'))")"
          else
            # Fallback for workflow_dispatch — read the commit time from git itself.
            COMMIT_TIME="$(git show -s --format=%cI $COMMIT_SHA_FULL | python3 -c "import sys; from datetime import datetime, timezone; print(datetime.fromisoformat(sys.stdin.read().strip()).astimezone(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'))")"
          fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > src/_version.py <<PY
          """Build-stamped version metadata. Generated by CI — do not edit."""
          __commit_sha__ = "${COMMIT_SHA}"
          __commit_sha_full__ = "${COMMIT_SHA_FULL}"
          __commit_time__ = "${COMMIT_TIME}"
          __build_time__ = "${BUILD_TIME}"
          __branch__ = "${BRANCH}"
          __commit_url__ = "${COMMIT_URL}"
          PY
          echo "--- src/_version.py ---"
          cat src/_version.py

      - name: Zip artifact for deployment
        # Exclude developer-only / build-artifact paths so Oryx gets a clean source tree.
        # .funcignore is NOT consulted here — this manual zip ships whatever we include.
        run: zip release.zip ./* -r -x "venv/*" ".venv/*" "__pycache__/*" "*/__pycache__/*" ".python_packages/*" "tests/*" ".squad/*" ".git/*" ".github/*" ".copilot/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v5
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9221E08B598D4BFA904C14DDA71D0A92 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7441746A0C9A445192F92E3DCC1C7360 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4D38CB5FB86341BCB71D640A83707C65 }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'windowbot-func'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # 2026-05-25 (Janine): tell Azure to run Oryx server-side so deps install into
          # .python_packages/lib/site-packages/ and the host serves a proper squashfs via
          # SCM_RUN_FROM_PACKAGE. Without these, the host gets a deps-less ZIP, every
          # `from azure.data.tables import ...` raises ModuleNotFoundError, and the
          # worker indexes zero functions (full outage — see 2026-05-21 entries).
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      # 2026-05-25 (Janine): post-deploy smoke test — fail the job if the host hasn't
      # registered the functions. The publish step reports success even when indexing
      # is broken; this is the gate that catches it. Mirrors the 2026-05-21 lesson:
      # "never trust the publish exit code alone."
      - name: Post-deploy smoke test
        shell: bash
        run: |
          set -euo pipefail
          # Give Oryx + host re-index time to settle.
          sleep 45
          URL="https://windowbot-func.azurewebsites.net/api/check"
          MAX_ATTEMPTS=6
          for i in $(seq 1 $MAX_ATTEMPTS); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$URL" --max-time 30 || echo "000")
            echo "Attempt $i/$MAX_ATTEMPTS: POST $URL → HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Smoke test passed."
              exit 0
            fi
            sleep 15
          done
          echo "❌ Smoke test failed: /api/check never returned 200."
          echo "   The deploy completed but the host is not serving functions."
          echo "   This is the 2026-05-21 failure mode — check whether the artifact"
          echo "   actually contains .python_packages/lib/site-packages/."
          exit 1

